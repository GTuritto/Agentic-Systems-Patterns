<svg xmlns="http://www.w3.org/2000/svg" width="940" height="300" viewBox="0 0 940 300" role="img" aria-labelledby="title desc">
  <title id="title">Human approval gate</title>
  <desc id="desc">A workflow where a model-proposed action passes through policy, approval, decision, execution, and audit logging.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="940" height="300" fill="#f8fafc"/>
  <text x="40" y="42" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Approval is a workflow pause, not a chat message</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="40" y="92" width="130" height="76" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
    <text x="105" y="122" font-size="14" font-weight="700" text-anchor="middle" fill="#075985">Proposal</text>
    <text x="105" y="145" font-size="12" text-anchor="middle" fill="#0f172a">tool and side effect</text>

    <line x1="178" y1="130" x2="218" y2="130" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="230" y="92" width="130" height="76" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="295" y="122" font-size="14" font-weight="700" text-anchor="middle" fill="#92400e">Policy</text>
    <text x="295" y="145" font-size="12" text-anchor="middle" fill="#0f172a">allow, deny, pause</text>

    <line x1="368" y1="130" x2="408" y2="130" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="420" y="92" width="140" height="76" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="490" y="122" font-size="14" font-weight="700" text-anchor="middle" fill="#5b21b6">Approval</text>
    <text x="490" y="145" font-size="12" text-anchor="middle" fill="#0f172a">evidence and risk</text>

    <line x1="568" y1="130" x2="608" y2="130" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="620" y="92" width="130" height="76" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="685" y="122" font-size="14" font-weight="700" text-anchor="middle" fill="#166534">Decision</text>
    <text x="685" y="145" font-size="12" text-anchor="middle" fill="#0f172a">approve or deny</text>

    <line x1="758" y1="130" x2="798" y2="130" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="810" y="92" width="90" height="76" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="855" y="122" font-size="14" font-weight="700" text-anchor="middle" fill="#991b1b">Execute</text>
    <text x="855" y="145" font-size="12" text-anchor="middle" fill="#0f172a">exact action</text>

    <path d="M855 176 C855 232 105 232 105 176" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="470" y="250" font-size="12" font-weight="700" text-anchor="middle" fill="#334155">Audit request, decision, approver, policy version, trace ID, and stop reason</text>
  </g>
</svg>
