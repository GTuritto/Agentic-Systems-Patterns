<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
<title id="title">Context Assembly Pipeline</title><desc id="desc">Diagram showing sources filtered through trust labels, budget, and selection into a model working set.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#5F6368"/></marker></defs>
<rect width="1120" height="560" fill="none"/>
<text x="560" y="45" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#173F4F">Context Assembly Pipeline</text>
<g font-family="Inter, Arial, sans-serif">
<rect x="55" y="115" width="210" height="70" rx="10" fill="#E8F0FE" stroke="#3367D6" stroke-width="2"/><text x="160" y="155" text-anchor="middle" font-size="15" fill="#202124">Goal and State</text>
<rect x="55" y="205" width="210" height="70" rx="10" fill="#E6F4EA" stroke="#188038" stroke-width="2"/><text x="160" y="245" text-anchor="middle" font-size="15" fill="#202124">Evidence</text>
<rect x="55" y="295" width="210" height="70" rx="10" fill="#FFF4E5" stroke="#F9AB00" stroke-width="2"/><text x="160" y="335" text-anchor="middle" font-size="15" fill="#202124">Tool Results</text>
<rect x="55" y="385" width="210" height="70" rx="10" fill="#F3E8FD" stroke="#9334E6" stroke-width="2"/><text x="160" y="425" text-anchor="middle" font-size="15" fill="#202124">Memory and Skills</text>
<rect x="350" y="165" width="215" height="95" rx="12" fill="#F1F3F4" stroke="#5F6368" stroke-width="2"/><text x="457" y="202" text-anchor="middle" font-size="16" font-weight="700" fill="#202124">Trust Labels</text><text x="457" y="230" text-anchor="middle" font-size="13" fill="#3C4043">system, internal, user, untrusted</text>
<rect x="350" y="315" width="215" height="95" rx="12" fill="#F1F3F4" stroke="#5F6368" stroke-width="2"/><text x="457" y="352" text-anchor="middle" font-size="16" font-weight="700" fill="#202124">Budget and Filters</text><text x="457" y="380" text-anchor="middle" font-size="13" fill="#3C4043">freshness, relevance, exclusions</text>
<rect x="655" y="225" width="200" height="110" rx="14" fill="#EAF5FF" stroke="#007B83" stroke-width="2"/><text x="755" y="268" text-anchor="middle" font-size="17" font-weight="700" fill="#202124">Working Set</text><text x="755" y="298" text-anchor="middle" font-size="13" fill="#3C4043">small, labeled, current</text>
<rect x="930" y="225" width="145" height="110" rx="14" fill="#FCE8E6" stroke="#D93025" stroke-width="2"/><text x="1002" y="268" text-anchor="middle" font-size="17" font-weight="700" fill="#202124">Model Call</text><text x="1002" y="298" text-anchor="middle" font-size="13" fill="#3C4043">next decision</text>
</g>
