<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="760" viewBox="0 0 1220 760" role="img" aria-labelledby="title desc">
  <title id="title">Production Agentic System Reference Architecture</title>
  <desc id="desc">End-to-end production architecture with intake, goal state, routing, Agentic RAG, workflows, policy, tools, evals, and trace logs.</desc>
