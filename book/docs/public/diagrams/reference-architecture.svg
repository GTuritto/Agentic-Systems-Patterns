  <g transform="translate(430 300)"><rect class="box" width="190" height="72" fill="#fce8e6" stroke="#d93025"/><text x="95" y="43" text-anchor="middle" class="box-title">Durable Workflow</text></g>
  <g transform="translate(690 300)"><rect class="box" width="180" height="72" fill="#e6f4ea" stroke="#188038"/><text x="90" y="43" text-anchor="middle" class="box-title">Multi-Agent Task</text></g>
