<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">Tool use policy boundary</title>
  <desc id="desc">A tool-using agent flow where the model proposes a tool call and the runtime validates policy before execution.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="920" height="300" fill="#f8fafc"/>
  <text x="40" y="42" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Tool use is a proposal, policy check, execution, and observation loop</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="40" y="92" width="140" height="70" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
    <text x="110" y="123" font-size="14" font-weight="700" text-anchor="middle" fill="#075985">Task</text>
    <text x="110" y="145" font-size="12" text-anchor="middle" fill="#0f172a">goal, state, budget</text>

    <line x1="188" y1="127" x2="238" y2="127" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="250" y="92" width="150" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="325" y="123" font-size="14" font-weight="700" text-anchor="middle" fill="#5b21b6">Model</text>
    <text x="325" y="145" font-size="12" text-anchor="middle" fill="#0f172a">proposes tool call</text>

    <line x1="408" y1="127" x2="458" y2="127" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="470" y="78" width="160" height="98" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="550" y="110" font-size="14" font-weight="700" text-anchor="middle" fill="#92400e">Runtime Boundary</text>
    <text x="550" y="133" font-size="12" text-anchor="middle" fill="#0f172a">schema, permission,</text>
    <text x="550" y="150" font-size="12" text-anchor="middle" fill="#0f172a">budget, approval</text>

    <line x1="638" y1="127" x2="688" y2="127" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="700" y="92" width="150" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="775" y="123" font-size="14" font-weight="700" text-anchor="middle" fill="#166534">Narrow Tool</text>
    <text x="775" y="145" font-size="12" text-anchor="middle" fill="#0f172a">typed side effect</text>

    <path d="M775 170 C775 225 325 225 325 170" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="552" y="245" font-size="12" font-weight="700" text-anchor="middle" fill="#334155">Observation returns as data, not instructions</text>

    <path d="M550 184 L550 218" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="470" y="226" width="160" height="42" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="550" y="252" font-size="12" font-weight="700" text-anchor="middle" fill="#991b1b">Deny, refuse, or escalate</text>
  </g>
</svg>
