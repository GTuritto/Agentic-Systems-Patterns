<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">Episodic Memory Event Lifecycle</title>
  <desc id="desc">An interaction or workflow event is classified, checked by write policy, stored in an episodic timeline, indexed for scoped retrieval, filtered for eligibility, injected as timestamped evidence, and governed through correction, deletion, expiry, and audit.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5f6368"/>
    </marker>
    <style>
      text{font-family:Inter,Arial,sans-serif;fill:#202124}
      .title{font-size:30px;font-weight:700}
      .subtitle{font-size:13px;fill:#5f6368}
      .label{font-size:15px;font-weight:700}
      .small{font-size:12px;fill:#5f6368}
      .box{rx:12;ry:12;stroke-width:2.2}
      .diamond{stroke-width:2.2}
      .edge{stroke:#5f6368;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .good{stroke:#188038;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .warn{stroke:#f9ab00;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .deny{stroke:#d93025;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .boundary{fill:none;stroke:#dadce0;stroke-width:2;stroke-dasharray:8 8}
    </style>
  </defs>
  <rect width="1320" height="760" fill="#ffffff"/>
  <text x="660" y="46" text-anchor="middle" class="title">Episodic Memory Event Lifecycle</text>
  <text x="660" y="74" text-anchor="middle" class="subtitle">Episodes are governed event records, not permanent facts or raw transcript storage.</text>

  <rect x="48" y="112" width="1224" height="492" class="boundary"/>
  <text x="68" y="138" class="small">Episodic boundary: every event keeps time, actor, scope, source evidence, retention, and correction path.</text>

  <g transform="translate(70 190)">
    <rect class="box" width="180" height="84" fill="#e8f0fe" stroke="#3367d6"/>
    <text x="90" y="31" text-anchor="middle" class="label">Interaction,</text>
    <text x="90" y="52" text-anchor="middle" class="label">tool result, or</text>
    <text x="90" y="69" text-anchor="middle" class="small">workflow event</text>
  </g>

  <g transform="translate(310 190)">
    <rect class="box" width="220" height="84" fill="#eaf5ff" stroke="#007b83"/>
    <text x="110" y="30" text-anchor="middle" class="label">Classify event</text>
    <text x="110" y="52" text-anchor="middle" class="small">type, actor, scope,</text>
    <text x="110" y="69" text-anchor="middle" class="small">source evidence</text>
  </g>

  <g transform="translate(600 168)">
    <path class="diamond" d="M105 0 L210 60 L105 120 L0 60 Z" fill="#fff4e5" stroke="#f9ab00"/>
    <text x="105" y="53" text-anchor="middle" class="label">Write</text>
    <text x="105" y="72" text-anchor="middle" class="label">policy</text>
  </g>

  <g transform="translate(885 126)">
    <rect class="box" width="190" height="72" fill="#fff4e5" stroke="#f9ab00"/>
    <text x="95" y="34" text-anchor="middle" class="label">Human or</text>
    <text x="95" y="54" text-anchor="middle" class="label">product review</text>
  </g>

  <g transform="translate(885 250)">
    <rect class="box" width="190" height="72" fill="#fce8e6" stroke="#d93025"/>
    <text x="95" y="35" text-anchor="middle" class="label">Do not</text>
    <text x="95" y="55" text-anchor="middle" class="label">store</text>
  </g>

  <g transform="translate(885 386)">
    <rect class="box" width="190" height="72" fill="#e6f4ea" stroke="#188038"/>
    <text x="95" y="35" text-anchor="middle" class="label">Episodic</text>
    <text x="95" y="55" text-anchor="middle" class="label">timeline store</text>
  </g>

  <g transform="translate(600 386)">
    <rect class="box" width="220" height="84" fill="#f3e8fd" stroke="#9334e6"/>
    <text x="110" y="30" text-anchor="middle" class="label">Index events</text>
    <text x="110" y="52" text-anchor="middle" class="small">actor, tenant, project,</text>
    <text x="110" y="69" text-anchor="middle" class="small">type, recency</text>
  </g>

  <g transform="translate(310 386)">
    <rect class="box" width="220" height="84" fill="#eaf5ff" stroke="#007b83"/>
    <text x="110" y="31" text-anchor="middle" class="label">Scoped event</text>
    <text x="110" y="52" text-anchor="middle" class="label">retrieval</text>
  </g>

  <g transform="translate(70 392)">
    <rect class="box" width="180" height="72" fill="#e8f0fe" stroke="#3367d6"/>
    <text x="90" y="35" text-anchor="middle" class="label">New</text>
    <text x="90" y="55" text-anchor="middle" class="label">task</text>
  </g>

  <g transform="translate(310 590)">
    <path class="diamond" d="M110 0 L220 62 L110 124 L0 62 Z" fill="#fff4e5" stroke="#f9ab00"/>
    <text x="110" y="55" text-anchor="middle" class="label">Eligible</text>
    <text x="110" y="74" text-anchor="middle" class="label">and fresh?</text>
  </g>

  <g transform="translate(70 616)">
    <rect class="box" width="180" height="72" fill="#fce8e6" stroke="#d93025"/>
    <text x="90" y="34" text-anchor="middle" class="label">Exclude, expire,</text>
    <text x="90" y="54" text-anchor="middle" class="label">or ask</text>
  </g>

  <g transform="translate(600 616)">
    <rect class="box" width="220" height="72" fill="#e6f4ea" stroke="#188038"/>
    <text x="110" y="34" text-anchor="middle" class="label">Inject as</text>
    <text x="110" y="54" text-anchor="middle" class="label">timestamped evidence</text>
  </g>

  <g transform="translate(885 616)">
    <rect class="box" width="190" height="72" fill="#e8f0fe" stroke="#3367d6"/>
    <text x="95" y="35" text-anchor="middle" class="label">Agent</text>
    <text x="95" y="55" text-anchor="middle" class="label">step</text>
  </g>

  <g transform="translate(1100 486)">
    <rect class="box" width="170" height="92" fill="#f1f3f4" stroke="#5f6368"/>
    <text x="85" y="30" text-anchor="middle" class="label">Correction,</text>
    <text x="85" y="51" text-anchor="middle" class="label">deletion, expiry,</text>
    <text x="85" y="69" text-anchor="middle" class="small">and audit</text>
  </g>

  <path class="edge" d="M250 232 H310"/>
  <path class="edge" d="M530 232 H600"/>
  <path class="warn" d="M810 228 C850 170 858 162 885 162"/>
  <path class="deny" d="M810 228 C850 278 858 286 885 286"/>
  <path class="good" d="M705 288 C745 360 815 422 885 422"/>
  <path class="good" d="M980 198 V386"/>
  <path class="deny" d="M980 198 V250"/>
  <path class="edge" d="M885 422 H820"/>
  <path class="edge" d="M600 428 H530"/>
  <path class="edge" d="M250 428 H310"/>
  <path class="edge" d="M420 470 V590"/>
  <path class="good" d="M530 652 H600"/>
  <path class="deny" d="M310 652 H250"/>
  <path class="edge" d="M820 652 H885"/>
  <path class="edge" d="M1075 652 C1130 645 1160 610 1180 578"/>
  <path class="edge" d="M1075 422 C1120 430 1155 455 1180 486"/>

  <text x="838" y="188" class="small">review</text>
  <text x="836" y="274" class="small">deny</text>
  <text x="758" y="354" class="small">allow</text>
  <text x="548" y="642" class="small">yes</text>
  <text x="268" y="642" class="small">no</text>
</svg>
