<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="720" viewBox="0 0 1160 720" role="img" aria-labelledby="title desc">
  <title id="title">Agentic RAG System</title>
  <desc id="desc">Query planning, retrieval routing, evidence filtering, verification, and answer synthesis loop.</desc>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#5f6368"/></marker><style>text{font-family:Inter,Arial,sans-serif;fill:#202124}.title{font-size:30px;font-weight:700}.box-title{font-size:18px;font-weight:700}.box-sub{font-size:14px;fill:#3c4043}.edge{stroke:#5f6368;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.good{stroke:#188038}.bad{stroke:#d93025}.warn{stroke:#f9ab00}.label{font-size:13px;font-weight:700}.box{rx:12;ry:12;stroke-width:2.4}</style></defs>
  <rect width="1160" height="720" fill="#fff"/>
  <text x="580" y="52" text-anchor="middle" class="title">Agentic RAG System</text>
  <g transform="translate(50 120)"><rect class="box" width="150" height="72" fill="#e8f0fe" stroke="#3367d6"/><text x="75" y="43" text-anchor="middle" class="box-title">User Question</text></g>
  <g transform="translate(260 120)"><rect class="box" width="190" height="72" fill="#e6f4ea" stroke="#188038"/><text x="95" y="31" text-anchor="middle" class="box-title">Query Planner</text><text x="95" y="56" text-anchor="middle" class="box-sub">decompose and refine</text></g>
  <g transform="translate(520 120)"><rect class="box" width="190" height="72" fill="#fff4e5" stroke="#f9ab00"/><text x="95" y="31" text-anchor="middle" class="box-title">Retrieval Router</text><text x="95" y="56" text-anchor="middle" class="box-sub">choose sources</text></g>
  <g transform="translate(790 90)"><rect class="box" width="230" height="102" fill="#f3e8fd" stroke="#9334e6"/><text x="115" y="32" text-anchor="middle" class="box-title">Sources</text><text x="115" y="58" text-anchor="middle" class="box-sub">vector, keyword, APIs</text><text x="115" y="78" text-anchor="middle" class="box-sub">and memory</text></g>
  <g transform="translate(790 250)"><rect class="box" width="230" height="82" fill="#eaf5ff" stroke="#007b83"/><text x="115" y="31" text-anchor="middle" class="box-title">Evidence Set</text><text x="115" y="58" text-anchor="middle" class="box-sub">chunks with metadata</text></g>
  <g transform="translate(520 250)"><rect class="box" width="220" height="82" fill="#f1f3f4" stroke="#5f6368"/><text x="110" y="31" text-anchor="middle" class="box-title">Rank and Filter</text><text x="110" y="57" text-anchor="middle" class="box-sub">dedupe, permissions</text><text x="110" y="75" text-anchor="middle" class="box-sub">and freshness</text></g>
  <g transform="translate(260 250)"><rect class="box" width="200" height="82" fill="#fce8e6" stroke="#d93025"/><text x="100" y="31" text-anchor="middle" class="box-title">Grounding Verifier</text><text x="100" y="58" text-anchor="middle" class="box-sub">is evidence enough?</text></g>
  <g transform="translate(260 430)"><rect class="box" width="200" height="82" fill="#e6f4ea" stroke="#188038"/><text x="100" y="31" text-anchor="middle" class="box-title">Synthesizer</text><text x="100" y="58" text-anchor="middle" class="box-sub">cited answer</text></g>
  <g transform="translate(520 430)"><rect class="box" width="200" height="82" fill="#fce8e6" stroke="#d93025"/><text x="100" y="31" text-anchor="middle" class="box-title">Ask, Refuse</text><text x="100" y="58" text-anchor="middle" class="box-sub">or Escalate</text></g>
  <path class="edge" d="M200 156 L260 156"/><path class="edge" d="M450 156 L520 156"/><path class="edge" d="M710 156 L790 140"/><path class="edge" d="M905 192 L905 250"/><path class="edge" d="M790 291 L740 291"/><path class="edge" d="M520 291 L460 291"/><path class="edge good" d="M360 332 L360 430"/><text x="374" y="386" class="label" fill="#188038">supported</text><path class="edge bad" d="M460 310 C500 335 540 375 590 430"/><text x="532" y="372" class="label" fill="#d93025">weak or unsafe</text><path class="edge warn" d="M300 250 C220 220 220 150 260 140"/><text x="216" y="200" class="label" fill="#f9ab00">refine</text>
</svg>
