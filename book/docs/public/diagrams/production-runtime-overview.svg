<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
<title id="title">Production Runtime Overview</title>
<desc id="desc">Production runtime control plane for agentic systems, showing request intake, state, policy, budgets, model proposals, validation, execution, tracing, checkpointing, and stop decisions.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#5F6368"/>
  </marker>
</defs>
<rect width="1120" height="600" fill="none"/>
<text x="560" y="45" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#173F4F">Production Runtime Overview</text>

<rect x="50" y="120" width="160" height="80" rx="8" ry="8" fill="#E8F0FE" stroke="#3367D6" stroke-width="2"/>
<text x="130" y="152" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#202124">User, event,</text>
<text x="130" y="174" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#202124">schedule, API</text>

<rect x="280" y="105" width="230" height="110" rx="8" ry="8" fill="#E6F4EA" stroke="#188038" stroke-width="2"/>
<text x="395" y="137" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#202124">Runtime control plane</text>
<text x="395" y="162" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#202124">state policy budget</text>
<text x="395" y="184" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#202124">trace approvals stop rules</text>

<rect x="590" y="120" width="170" height="80" rx="8" ry="8" fill="#FFF4E5" stroke="#F9AB00" stroke-width="2"/>
<text x="675" y="152" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#202124">Model proposes</text>
<text x="675" y="174" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#202124">next action</text>

<rect x="840" y="105" width="220" height="110" rx="8" ry="8" fill="#FCE8E6" stroke="#D93025" stroke-width="2"/>
<text x="950" y="137" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#202124">Runtime validates</text>
<text x="950" y="162" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#202124">schema permissions</text>
<text x="950" y="184" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#202124">budget evidence risk</text>

<rect x="840" y="300" width="220" height="90" rx="8" ry="8" fill="#EAF5FF" stroke="#007B83" stroke-width="2"/>
<text x="950" y="333" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#202124">Execute bounded step</text>
<text x="950" y="355" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#202124">tool workflow retrieval</text>

<rect x="590" y="305" width="170" height="80" rx="8" ry="8" fill="#F3E8FD" stroke="#9334E6" stroke-width="2"/>
<text x="675" y="337" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#202124">Checkpoint</text>
<text x="675" y="359" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#202124">trace eval state</text>

<rect x="280" y="300" width="230" height="90" rx="8" ry="8" fill="#F1F3F4" stroke="#5F6368" stroke-width="2"/>
<text x="395" y="333" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#202124">Decide transition</text>
<text x="395" y="355" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#202124">continue fallback stop</text>

<rect x="50" y="300" width="160" height="90" rx="8" ry="8" fill="#E6F4EA" stroke="#188038" stroke-width="2"/>
<text x="130" y="333" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#202124">Return, wait,</text>
<text x="130" y="355" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#202124">escalate, refuse</text>

<rect x="280" y="465" width="230" height="75" rx="8" ry="8" fill="#FFF4E5" stroke="#F9AB00" stroke-width="2"/>
<text x="395" y="503" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#202124">Replay and incident evals</text>

<rect x="590" y="465" width="220" height="75" rx="8" ry="8" fill="#E8F0FE" stroke="#3367D6" stroke-width="2"/>
<text x="700" y="503" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#202124">Rollout and rollback</text>

<line x1="210" y1="160" x2="280" y2="160" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="510" y1="160" x2="590" y2="160" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="760" y1="160" x2="840" y2="160" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="950" y1="215" x2="950" y2="300" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="840" y1="345" x2="760" y2="345" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="590" y1="345" x2="510" y2="345" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="280" y1="345" x2="210" y2="345" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="395" y1="300" x2="395" y2="215" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="395" y1="390" x2="395" y2="465" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="510" y1="502" x2="590" y2="502" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>

<text x="245" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">start</text>
<text x="550" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">context</text>
<text x="800" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">proposal</text>
<text x="965" y="258" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">allowed</text>
<text x="800" y="335" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">result</text>
<text x="550" y="335" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">record</text>
<text x="245" y="335" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">finish</text>
<text x="415" y="260" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">continue</text>
</svg>
