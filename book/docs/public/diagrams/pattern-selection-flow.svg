<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Pattern selection flow</title>
  <desc id="desc">Decision flow for selecting the least agentic pattern that satisfies the workload.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.title{font:700 26px Inter,Arial,sans-serif;fill:#0f172a}.sub{font:14px Inter,Arial,sans-serif;fill:#475569}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}.decision{fill:#ecfeff;stroke:#0891b2;stroke-width:1.8}.pattern{fill:#f0fdf4;stroke:#16a34a;stroke-width:1.8}
      .risk{fill:#fff7ed;stroke:#f97316;stroke-width:1.8}.txt{font:13px Inter,Arial,sans-serif;fill:#0f172a}.label{font:700 13px Inter,Arial,sans-serif;fill:#0f172a}
      .small{font:12px Inter,Arial,sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#334155"/></marker>
  </defs>
  <rect class="bg" width="1180" height="760"/>
  <text class="title" x="42" y="48">Pattern Selection Flow</text>
  <text class="sub" x="42" y="72">Start with the least agentic shape. Move right only when the workload requires more dynamic decisions.</text>

  <rect class="decision" x="60" y="112" width="230" height="92" rx="8"/>
  <text class="label" x="82" y="142">Is one model call enough?</text>
  <text class="txt" x="82" y="166">Single answer, extraction,</text>
  <text class="txt" x="82" y="186">classification, or rewrite.</text>

  <rect class="pattern" x="60" y="258" width="230" height="78" rx="8"/>
  <text class="label" x="82" y="288">Use LLM call</text>
  <text class="txt" x="82" y="312">Add structured output</text>
  <text class="txt" x="82" y="330">and validation.</text>

  <rect class="decision" x="360" y="112" width="230" height="92" rx="8"/>
  <text class="label" x="382" y="142">Are phases known?</text>
  <text class="txt" x="382" y="166">The path is stable and</text>
  <text class="txt" x="382" y="186">each step can be checked.</text>

  <rect class="pattern" x="360" y="258" width="230" height="78" rx="8"/>
  <text class="label" x="382" y="288">Use chain or workflow</text>
  <text class="txt" x="382" y="312">Code owns sequence;</text>
  <text class="txt" x="382" y="330">model owns judgment.</text>

  <rect class="decision" x="660" y="112" width="230" height="92" rx="8"/>
  <text class="label" x="682" y="142">Do inputs diverge?</text>
  <text class="txt" x="682" y="166">Different requests need</text>
  <text class="txt" x="682" y="186">different tools or policies.</text>

  <rect class="pattern" x="660" y="258" width="230" height="78" rx="8"/>
  <text class="label" x="682" y="288">Use routing/handoffs</text>
  <text class="txt" x="682" y="312">Route to bounded owners</text>
  <text class="txt" x="682" y="330">with traceable reasons.</text>

  <rect class="decision" x="60" y="420" width="230" height="92" rx="8"/>
  <text class="label" x="82" y="450">Does next step depend</text>
  <text class="label" x="82" y="468">on observations?</text>
  <text class="txt" x="82" y="492">Tool results change the path.</text>

  <rect class="pattern" x="60" y="570" width="230" height="78" rx="8"/>
  <text class="label" x="82" y="600">Use single agent loop</text>
  <text class="txt" x="82" y="624">Bound tools, budget,</text>
  <text class="txt" x="82" y="642">state, and stop reason.</text>

  <rect class="decision" x="360" y="420" width="230" height="92" rx="8"/>
  <text class="label" x="382" y="450">Are roles truly separate?</text>
  <text class="txt" x="382" y="474">Different context, tools,</text>
  <text class="txt" x="382" y="494">permissions, or review.</text>

  <rect class="pattern" x="360" y="570" width="230" height="78" rx="8"/>
  <text class="label" x="382" y="600">Use multi-agent topology</text>
  <text class="txt" x="382" y="624">Keep one accountable</text>
  <text class="txt" x="382" y="642">owner and shared trace.</text>

  <rect class="decision" x="660" y="420" width="230" height="92" rx="8"/>
  <text class="label" x="682" y="450">Does work span time?</text>
  <text class="txt" x="682" y="474">Approvals, retries, events,</text>
  <text class="txt" x="682" y="494">or partial progress.</text>

  <rect class="pattern" x="660" y="570" width="230" height="78" rx="8"/>
  <text class="label" x="682" y="600">Use durable workflow</text>
  <text class="txt" x="682" y="624">Persist checkpoints,</text>
  <text class="txt" x="682" y="642">approvals, and replay.</text>

  <rect class="risk" x="940" y="258" width="190" height="254" rx="8"/>
  <text class="label" x="962" y="288">Always add gates</text>
  <text class="txt" x="962" y="322">Typed contracts</text>
  <text class="txt" x="962" y="350">Tool policy</text>
  <text class="txt" x="962" y="378">Approval for risk</text>
  <text class="txt" x="962" y="406">Trace and evals</text>
  <text class="txt" x="962" y="434">Rollback path</text>
  <text class="small" x="962" y="476">If these are missing,</text>
  <text class="small" x="962" y="494">do not climb the ladder.</text>

  <path class="arrow" d="M290 158 H360"/><path class="arrow" d="M590 158 H660"/>
  <path class="arrow" d="M175 204 V258"/><path class="arrow" d="M475 204 V258"/><path class="arrow" d="M775 204 V258"/>
  <path class="arrow" d="M890 158 C940 158 950 220 980 258"/>
  <path class="arrow" d="M775 336 C775 380 175 380 175 420"/>
  <path class="arrow" d="M290 466 H360"/><path class="arrow" d="M590 466 H660"/>
  <path class="arrow" d="M175 512 V570"/><path class="arrow" d="M475 512 V570"/><path class="arrow" d="M775 512 V570"/>
  <path class="arrow" d="M890 466 H940"/>
</svg>
