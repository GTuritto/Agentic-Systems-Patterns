<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Systems Pattern Classification Mind Map</title>
  <desc id="desc">A mind map grouping agentic system patterns by foundations, selection, control loops, context, tools, multi-agent systems, architecture, runtime, security, and human collaboration.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .hub { fill: #111827; }
      .hubText { fill: #ffffff; font: 700 30px Arial, sans-serif; }
      .nodeTitle { fill: #111827; font: 700 22px Arial, sans-serif; }
      .nodeText { fill: #334155; font: 16px Arial, sans-serif; }
      .small { fill: #475569; font: 14px Arial, sans-serif; }
      .line { fill: none; stroke: #94a3b8; stroke-width: 3; }
      .card { stroke-width: 2; rx: 14; ry: 14; }
      .foundation { fill: #e0f2fe; stroke: #0284c7; }
      .selection { fill: #dcfce7; stroke: #16a34a; }
      .control { fill: #fef3c7; stroke: #d97706; }
      .context { fill: #ede9fe; stroke: #7c3aed; }
      .tools { fill: #fee2e2; stroke: #dc2626; }
      .multi { fill: #ccfbf1; stroke: #0f766e; }
      .architecture { fill: #fce7f3; stroke: #db2777; }
      .runtime { fill: #e2e8f0; stroke: #475569; }
      .security { fill: #ffedd5; stroke: #ea580c; }
      .human { fill: #ecfccb; stroke: #65a30d; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1120"/>

  <path class="line" d="M800 560 C650 470 530 390 390 260"/>
  <path class="line" d="M800 560 C650 535 520 505 370 500"/>
  <path class="line" d="M800 560 C650 650 530 750 390 875"/>
  <path class="line" d="M800 560 C755 420 720 305 690 160"/>
  <path class="line" d="M800 560 C860 425 910 310 950 160"/>
  <path class="line" d="M800 560 C950 470 1070 390 1210 260"/>
  <path class="line" d="M800 560 C955 535 1080 505 1230 500"/>
  <path class="line" d="M800 560 C950 650 1070 750 1210 875"/>
  <path class="line" d="M800 560 C770 710 735 835 690 980"/>
  <path class="line" d="M800 560 C850 710 895 835 950 980"/>

  <rect x="625" y="480" width="350" height="160" rx="22" ry="22" class="hub"/>
  <text x="800" y="535" text-anchor="middle" class="hubText">Agentic Systems</text>
  <text x="800" y="575" text-anchor="middle" class="hubText">Patterns</text>
  <text x="800" y="610" text-anchor="middle" class="small" fill="#d1d5db">Choose boundaries before autonomy</text>

  <rect x="90" y="145" width="360" height="230" class="card foundation"/>
  <text x="270" y="190" text-anchor="middle" class="nodeTitle">Foundations</text>
  <text x="120" y="230" class="nodeText">What is the minimal agent?</text>
  <text x="120" y="265" class="small">LLM call</text>
  <text x="120" y="292" class="small">Agent loop</text>
  <text x="120" y="319" class="small">Goals and state</text>
  <text x="120" y="346" class="small">Structured output</text>

  <rect x="80" y="420" width="390" height="225" class="card selection"/>
  <text x="275" y="465" text-anchor="middle" class="nodeTitle">Pattern Selection</text>
  <text x="110" y="505" class="nodeText">How much autonomy is justified?</text>
  <text x="110" y="540" class="small">Prompt chains and gates</text>
  <text x="110" y="567" class="small">Routing and handoffs</text>
  <text x="110" y="594" class="small">Resource-aware design</text>
  <text x="110" y="621" class="small">Circuit breakers and replay</text>

  <rect x="90" y="745" width="370" height="245" class="card control"/>
  <text x="275" y="790" text-anchor="middle" class="nodeTitle">Control Loops</text>
  <text x="120" y="830" class="nodeText">Who decides the next step?</text>
  <text x="120" y="865" class="small">Planning and execution</text>
  <text x="120" y="892" class="small">ReAct</text>
  <text x="120" y="919" class="small">Reflection</text>
  <text x="120" y="946" class="small">Evaluator-optimizer</text>
  <text x="120" y="973" class="small">Self-healing workflows</text>

  <rect x="520" y="40" width="360" height="230" class="card context"/>
  <text x="700" y="85" text-anchor="middle" class="nodeTitle">Context And Memory</text>
  <text x="550" y="125" class="nodeText">What should the model know now?</text>
  <text x="550" y="160" class="small">Context budgets</text>
  <text x="550" y="187" class="small">Working memory</text>
  <text x="550" y="214" class="small">RAG and semantic recall</text>
  <text x="550" y="241" class="small">Episodic memory</text>

  <rect x="920" y="40" width="390" height="245" class="card tools"/>
  <text x="1115" y="85" text-anchor="middle" class="nodeTitle">Tools And Protocols</text>
  <text x="950" y="125" class="nodeText">What can the agent do?</text>
  <text x="950" y="160" class="small">Tool use</text>
  <text x="950" y="187" class="small">MCP</text>
  <text x="950" y="214" class="small">Skills</text>
  <text x="950" y="241" class="small">A2A communication</text>
  <text x="950" y="268" class="small">Human approval gates</text>

  <rect x="1145" y="145" width="370" height="250" class="card multi"/>
  <text x="1330" y="190" text-anchor="middle" class="nodeTitle">Multi-Agent Systems</text>
  <text x="1175" y="230" class="nodeText">When should work be split?</text>
  <text x="1175" y="265" class="small">Task delegation</text>
  <text x="1175" y="292" class="small">Supervisor-worker</text>
  <text x="1175" y="319" class="small">Parallel agents</text>
  <text x="1175" y="346" class="small">Debate and consensus</text>
  <text x="1175" y="373" class="small">Crews and flows</text>

  <rect x="1130" y="420" width="400" height="250" class="card architecture"/>
  <text x="1330" y="465" text-anchor="middle" class="nodeTitle">System Architecture</text>
  <text x="1160" y="505" class="nodeText">How does this become a product?</text>
  <text x="1160" y="540" class="small">Agentic RAG systems</text>
  <text x="1160" y="567" class="small">Coding agents</text>
  <text x="1160" y="594" class="small">Computer-use agents</text>
  <text x="1160" y="621" class="small">Domain agents</text>
  <text x="1160" y="648" class="small">Reference architecture</text>

  <rect x="1145" y="745" width="370" height="245" class="card runtime"/>
  <text x="1330" y="790" text-anchor="middle" class="nodeTitle">Production Runtime</text>
  <text x="1175" y="830" class="nodeText">How does it run over time?</text>
  <text x="1175" y="865" class="small">Durable workflows</text>
  <text x="1175" y="892" class="small">Observability and evals</text>
  <text x="1175" y="919" class="small">Policy enforcement</text>
  <text x="1175" y="946" class="small">Event triggers</text>
  <text x="1175" y="973" class="small">Runtime orchestration</text>

  <rect x="495" y="870" width="390" height="215" class="card security"/>
  <text x="690" y="915" text-anchor="middle" class="nodeTitle">Security And Governance</text>
  <text x="525" y="955" class="nodeText">What must not be delegated?</text>
  <text x="525" y="990" class="small">Sandboxing</text>
  <text x="525" y="1017" class="small">Scoped tools</text>
  <text x="525" y="1044" class="small">Policy gates and audit</text>
  <text x="525" y="1071" class="small">Egress control</text>

  <rect x="925" y="870" width="390" height="215" class="card human"/>
  <text x="1120" y="915" text-anchor="middle" class="nodeTitle">Human Collaboration</text>
  <text x="955" y="955" class="nodeText">Where do humans stay in control?</text>
  <text x="955" y="990" class="small">Approval gates</text>
  <text x="955" y="1017" class="small">Agent UX and trust</text>
  <text x="955" y="1044" class="small">Escalation</text>
  <text x="955" y="1071" class="small">Handoff protocols</text>
</svg>
