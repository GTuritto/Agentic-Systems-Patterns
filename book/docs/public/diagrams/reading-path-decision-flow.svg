<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Reading path decision flow</title>
  <desc id="desc">A decision flow from the reader's goal to the reading path and the evidence each path should produce.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#527887"/>
    </marker>
    <style>
      .box { fill: #fffaf0; stroke: #c7a76a; stroke-width: 2; rx: 10; }
      .path { fill: #e8f0ed; stroke: #527887; stroke-width: 2; rx: 10; }
      .evidence { fill: #f7fafb; stroke: #d9e2e6; stroke-width: 2; rx: 10; }
      .line { stroke: #527887; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .label { fill: #173f4f; font: 700 17px Inter, Arial, sans-serif; text-anchor: middle; }
      .small { fill: #4f5b62; font: 13px Inter, Arial, sans-serif; text-anchor: middle; }
    </style>
  </defs>
  <rect x="455" y="24" width="270" height="72" class="box"/>
  <text x="590" y="54" class="label">What are you trying to do?</text>
  <text x="590" y="78" class="small">Choose the route by evidence needed</text>
  <g>
    <rect x="30" y="150" width="190" height="62" class="path"/><text x="125" y="187" class="label">Learn</text>
    <rect x="260" y="150" width="190" height="62" class="path"/><text x="355" y="187" class="label">Design</text>
    <rect x="495" y="150" width="190" height="62" class="path"/><text x="590" y="187" class="label">Build</text>
    <rect x="730" y="150" width="190" height="62" class="path"/><text x="825" y="187" class="label">Compare</text>
    <rect x="960" y="150" width="190" height="62" class="path"/><text x="1055" y="187" class="label">Ship</text>
  </g>
  <path d="M590 96 V122 H125 V140" class="line"/>
  <path d="M590 96 V122 H355 V140" class="line"/>
  <path d="M590 96 V140" class="line"/>
  <path d="M590 96 V122 H825 V140" class="line"/>
  <path d="M590 96 V122 H1055 V140" class="line"/>
  <g>
    <rect x="30" y="280" width="190" height="62" class="box"/><text x="125" y="305" class="label">First-Time Path</text><text x="125" y="329" class="small">Vocabulary and boundaries</text>
    <rect x="260" y="280" width="190" height="62" class="box"/><text x="355" y="305" class="label">Builder Path</text><text x="355" y="329" class="small">Architecture and controls</text>
    <rect x="495" y="280" width="190" height="62" class="box"/><text x="590" y="305" class="label">Lab Path</text><text x="590" y="329" class="small">Runnable slice</text>
    <rect x="730" y="280" width="190" height="62" class="box"/><text x="825" y="305" class="label">Capstone Path</text><text x="825" y="329" class="small">Complete examples</text>
    <rect x="960" y="280" width="190" height="62" class="box"/><text x="1055" y="305" class="label">Production Gate</text><text x="1055" y="329" class="small">Ship or no-ship</text>
  </g>
  <path d="M125 212 V270" class="line"/><path d="M355 212 V270" class="line"/><path d="M590 212 V270" class="line"/><path d="M825 212 V270" class="line"/><path d="M1055 212 V270" class="line"/>
  <g>
    <rect x="30" y="410" width="190" height="70" class="evidence"/><text x="125" y="438" class="small">Explain model call,</text><text x="125" y="460" class="small">workflow, agent, multi-agent</text>
    <rect x="260" y="410" width="190" height="70" class="evidence"/><text x="355" y="438" class="small">Sketch owners, evals,</text><text x="355" y="460" class="small">risks, rollback</text>
    <rect x="495" y="410" width="190" height="70" class="evidence"/><text x="590" y="438" class="small">Run code and list</text><text x="590" y="460" class="small">missing controls</text>
    <rect x="730" y="410" width="190" height="70" class="evidence"/><text x="825" y="438" class="small">Compare traces, evals,</text><text x="825" y="460" class="small">ADRs, runbooks</text>
    <rect x="960" y="410" width="190" height="70" class="evidence"/><text x="1055" y="438" class="small">Show release evidence</text><text x="1055" y="460" class="small">and decision</text>
  </g>
  <path d="M125 342 V400" class="line"/><path d="M355 342 V400" class="line"/><path d="M590 342 V400" class="line"/><path d="M825 342 V400" class="line"/><path d="M1055 342 V400" class="line"/>
</svg>
