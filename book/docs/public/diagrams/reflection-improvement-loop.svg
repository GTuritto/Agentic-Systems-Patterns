<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="700" viewBox="0 0 1260 700" role="img" aria-labelledby="title desc">
  <title id="title">Reflection Improvement Loop</title>
  <desc id="desc">A draft result is checked against quality criteria, reflected on for concrete defects, revised when actionable issues exist, validated against criteria, accepted, escalated, or stopped with trace evidence.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5f6368"/>
    </marker>
    <style>
      text{font-family:Inter,Arial,sans-serif;fill:#202124}
      .title{font-size:30px;font-weight:700}
      .subtitle{font-size:13px;fill:#5f6368}
      .label{font-size:15px;font-weight:700}
      .small{font-size:12px;fill:#5f6368}
      .box{rx:12;ry:12;stroke-width:2.2}
      .diamond{stroke-width:2.2}
      .edge{stroke:#5f6368;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .good{stroke:#188038;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .warn{stroke:#f9ab00;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .deny{stroke:#d93025;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .loop{stroke:#3367d6;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
      .boundary{fill:none;stroke:#dadce0;stroke-width:2;stroke-dasharray:8 8}
    </style>
  </defs>
  <rect width="1260" height="700" fill="#ffffff"/>
  <text x="630" y="46" text-anchor="middle" class="title">Reflection Improvement Loop</text>
  <text x="630" y="74" text-anchor="middle" class="subtitle">Reflection is useful only when critique finds concrete defects and a bounded revision can improve the result.</text>

  <rect x="54" y="112" width="1152" height="420" class="boundary"/>
  <text x="74" y="138" class="small">Reflection boundary: criteria, budget, validation, and stop reason prevent endless self-review.</text>

  <g transform="translate(76 218)">
    <rect class="box" width="170" height="78" fill="#e8f0fe" stroke="#3367d6"/>
    <text x="85" y="32" text-anchor="middle" class="label">Draft answer,</text>
    <text x="85" y="53" text-anchor="middle" class="label">plan, or action</text>
  </g>

  <g transform="translate(300 218)">
    <rect class="box" width="190" height="78" fill="#eaf5ff" stroke="#007b83"/>
    <text x="95" y="32" text-anchor="middle" class="label">Quality criteria</text>
    <text x="95" y="53" text-anchor="middle" class="label">and constraints</text>
  </g>

  <g transform="translate(545 218)">
    <rect class="box" width="190" height="78" fill="#f3e8fd" stroke="#9334e6"/>
    <text x="95" y="32" text-anchor="middle" class="label">Reflect on</text>
    <text x="95" y="53" text-anchor="middle" class="label">concrete defects</text>
  </g>

  <g transform="translate(800 196)">
    <path class="diamond" d="M105 0 L210 60 L105 120 L0 60 Z" fill="#fff4e5" stroke="#f9ab00"/>
    <text x="105" y="53" text-anchor="middle" class="label">Actionable</text>
    <text x="105" y="72" text-anchor="middle" class="label">issue?</text>
  </g>

  <g transform="translate(1035 218)">
    <rect class="box" width="160" height="78" fill="#e6f4ea" stroke="#188038"/>
    <text x="80" y="33" text-anchor="middle" class="label">Accept current</text>
    <text x="80" y="54" text-anchor="middle" class="label">result</text>
  </g>

  <g transform="translate(800 406)">
    <rect class="box" width="210" height="78" fill="#e8f0fe" stroke="#3367d6"/>
    <text x="105" y="33" text-anchor="middle" class="label">Revise output</text>
    <text x="105" y="54" text-anchor="middle" class="label">or state</text>
  </g>

  <g transform="translate(545 384)">
    <path class="diamond" d="M105 0 L210 60 L105 120 L0 60 Z" fill="#fff4e5" stroke="#f9ab00"/>
    <text x="105" y="53" text-anchor="middle" class="label">Meets</text>
    <text x="105" y="72" text-anchor="middle" class="label">criteria?</text>
  </g>

  <g transform="translate(300 406)">
    <rect class="box" width="190" height="78" fill="#fce8e6" stroke="#d93025"/>
    <text x="95" y="32" text-anchor="middle" class="label">Escalate, refuse,</text>
    <text x="95" y="53" text-anchor="middle" class="label">or stop</text>
  </g>

  <g transform="translate(480 590)">
    <rect class="box" width="300" height="72" fill="#f1f3f4" stroke="#5f6368"/>
    <text x="150" y="34" text-anchor="middle" class="label">Trace critique, revision,</text>
    <text x="150" y="54" text-anchor="middle" class="label">and stop reason</text>
  </g>

  <path class="edge" d="M246 257 H300"/>
  <path class="edge" d="M490 257 H545"/>
  <path class="edge" d="M735 257 H800"/>
  <path class="good" d="M1010 257 H1035"/>
  <path class="warn" d="M905 316 V406"/>
  <path class="edge" d="M800 445 H755"/>
  <path class="good" d="M650 384 C720 340 890 350 1060 296"/>
  <path class="deny" d="M545 445 H490"/>
  <path class="loop" d="M650 504 C650 555 905 548 905 484"/>
  <path class="edge" d="M1115 296 C1010 580 780 584 700 590"/>
  <path class="edge" d="M395 484 C430 545 500 570 560 590"/>

  <text x="1015" y="247" class="small">no</text>
  <text x="915" y="362" class="small">yes</text>
  <text x="712" y="360" class="small">yes</text>
  <text x="492" y="435" class="small">budget or risk</text>
  <text x="760" y="544" class="small">no, within budget</text>
</svg>
