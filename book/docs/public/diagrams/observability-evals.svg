<text x="410" y="115" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#202124">Trace</text>
<text x="410" y="137" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#202124">model, tool, state</text>
