<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
<title id="title">Observability and Evals</title><desc id="desc">Architecture diagram for Observability and Evals.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#5F6368"/></marker></defs>
<rect width="1120" height="520" fill="none"/>
<text x="560" y="45" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#173F4F">Observability and Evals</text>
<line x1="230" y1="190" x2="300" y2="125" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<text x="265" y="149.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">records</text>
