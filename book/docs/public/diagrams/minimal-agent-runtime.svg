<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Minimal agent runtime architecture</title>
  <desc id="desc">A minimal agent runtime flow showing goal, state, context, decision, validation, policy, tools, observations, trace, evals, and stop reasons.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .box{fill:#fff;stroke:#334155;stroke-width:2;rx:8}
      .soft{fill:#eef6ff;stroke:#2563eb;stroke-width:2;rx:8}
      .gate{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:8}
      .store{fill:#f0fdf4;stroke:#15803d;stroke-width:2;rx:8}
      .eval{fill:#f5f3ff;stroke:#6d28d9;stroke-width:2;rx:8}
      .text{font-family:Inter,Arial,sans-serif;font-size:17px;fill:#0f172a}
      .small{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#475569}
      .title{font-family:Inter,Arial,sans-serif;font-size:24px;font-weight:700;fill:#0f172a}
      .line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#64748b;stroke-width:2;fill:none;stroke-dasharray:7 7;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="620"/>
  <text class="title" x="40" y="48">Minimal Agent Runtime</text>
  <text class="small" x="40" y="74">The model proposes decisions. The runtime owns state, policy, execution, traces, evals, and stop conditions.</text>

  <rect class="box" x="40" y="130" width="140" height="72"/>
  <text class="text" x="72" y="160">Goal</text>
  <text class="small" x="64" y="184">task + limits</text>

  <rect class="store" x="250" y="110" width="170" height="112"/>
  <text class="text" x="300" y="145">State</text>
  <text class="small" x="278" y="171">steps</text>
  <text class="small" x="278" y="190">observations</text>
  <text class="small" x="278" y="209">stop reason</text>

  <rect class="soft" x="500" y="110" width="190" height="112"/>
  <text class="text" x="538" y="145">Context Packet</text>
  <text class="small" x="528" y="171">goal + state summary</text>
  <text class="small" x="528" y="190">tools disclosed</text>
  <text class="small" x="528" y="209">memory included/omitted</text>

  <rect class="box" x="760" y="110" width="170" height="112"/>
  <text class="text" x="804" y="145">Decision</text>
  <text class="small" x="792" y="171">answer</text>
  <text class="small" x="792" y="190">tool call</text>
  <text class="small" x="792" y="209">ask human / stop</text>

  <rect class="gate" x="760" y="292" width="170" height="94"/>
  <text class="text" x="794" y="327">Policy Gate</text>
  <text class="small" x="792" y="353">allow / deny</text>
  <text class="small" x="792" y="372">approval required</text>

  <rect class="box" x="500" y="292" width="190" height="94"/>
  <text class="text" x="546" y="327">Tool Registry</text>
  <text class="small" x="528" y="353">capability metadata</text>
  <text class="small" x="528" y="372">structured result</text>

  <rect class="store" x="250" y="292" width="170" height="94"/>
  <text class="text" x="286" y="327">Observation</text>
  <text class="small" x="278" y="353">tool result</text>
  <text class="small" x="278" y="372">policy result</text>

  <rect class="eval" x="250" y="455" width="220" height="88"/>
  <text class="text" x="306" y="490">Trace + Evals</text>
  <text class="small" x="282" y="516">trajectory checks</text>
  <text class="small" x="282" y="535">forbidden tool detection</text>

  <rect class="gate" x="760" y="455" width="170" height="88"/>
  <text class="text" x="794" y="490">Stop Reason</text>
  <text class="small" x="792" y="516">success / blocked</text>
  <text class="small" x="792" y="535">budget / failure</text>

  <path class="line" d="M180 166 H250"/>
  <path class="line" d="M420 166 H500"/>
  <path class="line" d="M690 166 H760"/>
  <path class="line" d="M845 222 V292"/>
  <path class="line" d="M760 339 H690"/>
  <path class="line" d="M500 339 H420"/>
  <path class="line" d="M335 292 V222"/>
  <path class="dash" d="M335 386 V455"/>
  <path class="dash" d="M470 499 H760"/>
  <path class="line" d="M930 339 C1010 339 1010 166 930 166"/>
  <path class="line" d="M845 386 V455"/>
</svg>
