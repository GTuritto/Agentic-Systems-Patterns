<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
<title id="title">Agents As Services Call Flow</title><desc id="desc">Diagram showing a caller invoking an agent service through a typed request, policy, execution, and typed result.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#5F6368"/></marker></defs>
<rect width="1120" height="560" fill="none"/>
<text x="560" y="45" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#173F4F">Agents As Services Call Flow</text>
<g font-family="Inter, Arial, sans-serif">
<rect x="55" y="210" width="170" height="95" rx="12" fill="#E8F0FE" stroke="#3367D6" stroke-width="2"/><text x="140" y="250" text-anchor="middle" font-size="17" font-weight="700" fill="#202124">Caller</text><text x="140" y="276" text-anchor="middle" font-size="13" fill="#3C4043">agent, app, workflow</text>
<rect x="300" y="210" width="190" height="95" rx="12" fill="#F1F3F4" stroke="#5F6368" stroke-width="2"/><text x="395" y="245" text-anchor="middle" font-size="17" font-weight="700" fill="#202124">Task Contract</text><text x="395" y="272" text-anchor="middle" font-size="13" fill="#3C4043">schema, budget, refs</text>
<rect x="565" y="135" width="190" height="85" rx="12" fill="#E6F4EA" stroke="#188038" stroke-width="2"/><text x="660" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#202124">Policy Check</text><text x="660" y="194" text-anchor="middle" font-size="13" fill="#3C4043">auth, scope, approval</text>
<rect x="565" y="300" width="190" height="95" rx="12" fill="#FFF4E5" stroke="#F9AB00" stroke-width="2"/><text x="660" y="338" text-anchor="middle" font-size="17" font-weight="700" fill="#202124">Agent Service</text><text x="660" y="365" text-anchor="middle" font-size="13" fill="#3C4043">loop, tools, memory</text>
<rect x="830" y="210" width="210" height="95" rx="12" fill="#F3E8FD" stroke="#9334E6" stroke-width="2"/><text x="935" y="245" text-anchor="middle" font-size="17" font-weight="700" fill="#202124">Typed Result</text><text x="935" y="272" text-anchor="middle" font-size="13" fill="#3C4043">status, output, trace</text>
<rect x="565" y="450" width="190" height="55" rx="10" fill="#EAF5FF" stroke="#007B83" stroke-width="2"/><text x="660" y="482" text-anchor="middle" font-size="14" fill="#202124">Trace and eval hooks</text>
</g>
<line x1="225" y1="257" x2="300" y2="257" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="490" y1="240" x2="565" y2="185" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="660" y1="220" x2="660" y2="300" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="755" y1="348" x2="830" y2="275" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="660" y1="395" x2="660" y2="450" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
</svg>
