<svg xmlns="http://www.w3.org/2000/svg" width="920" height="220" viewBox="0 0 920 220" role="img" aria-labelledby="title desc">
  <title id="title">Pattern evaluation flow</title>
  <desc id="desc">A flow from pattern choice to risk analysis, controls, evals, and production operation.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="920" height="220" fill="#f8fafc"/>
  <text x="40" y="42" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Evaluate the pattern before you scale the autonomy</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="40" y="82" width="140" height="82" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
    <text x="110" y="115" font-size="15" font-weight="700" text-anchor="middle" fill="#075985">Pattern</text>
    <text x="110" y="140" font-size="12" text-anchor="middle" fill="#0f172a">What job does it own?</text>

    <line x1="188" y1="123" x2="238" y2="123" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="250" y="82" width="140" height="82" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="320" y="115" font-size="15" font-weight="700" text-anchor="middle" fill="#92400e">Risks</text>
    <text x="320" y="140" font-size="12" text-anchor="middle" fill="#0f172a">Where can it fail?</text>

    <line x1="398" y1="123" x2="448" y2="123" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="460" y="82" width="140" height="82" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="530" y="115" font-size="15" font-weight="700" text-anchor="middle" fill="#166534">Controls</text>
    <text x="530" y="140" font-size="12" text-anchor="middle" fill="#0f172a">What bounds it?</text>

    <line x1="608" y1="123" x2="658" y2="123" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="670" y="82" width="100" height="82" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="720" y="115" font-size="15" font-weight="700" text-anchor="middle" fill="#5b21b6">Evals</text>
    <text x="720" y="140" font-size="12" text-anchor="middle" fill="#0f172a">How do we prove it?</text>

    <line x1="778" y1="123" x2="828" y2="123" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="840" y="82" width="40" height="82" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="860" y="111" font-size="13" font-weight="700" text-anchor="middle" fill="#991b1b">Ops</text>
    <text x="860" y="133" font-size="10" text-anchor="middle" fill="#0f172a">run</text>
    <text x="860" y="148" font-size="10" text-anchor="middle" fill="#0f172a">learn</text>
  </g>
</svg>
