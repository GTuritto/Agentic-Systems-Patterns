<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">Planning and Execution Control Flow</title>
  <desc id="desc">A goal becomes an ordered plan, passes review, enters an executable step queue, validates each next step, executes the step, observes results, updates progress and budget, replans or stops, and records trace evidence.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5f6368"/>
    </marker>
    <style>
      text{font-family:Inter,Arial,sans-serif;fill:#202124}
      .title{font-size:30px;font-weight:700}
      .subtitle{font-size:13px;fill:#5f6368}
      .label{font-size:15px;font-weight:700}
      .small{font-size:12px;fill:#5f6368}
      .box{rx:12;ry:12;stroke-width:2.2}
      .diamond{stroke-width:2.2}
      .edge{stroke:#5f6368;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .good{stroke:#188038;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .warn{stroke:#f9ab00;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .deny{stroke:#d93025;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .loop{stroke:#3367d6;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
      .boundary{fill:none;stroke:#dadce0;stroke-width:2;stroke-dasharray:8 8}
    </style>
  </defs>
  <rect width="1320" height="760" fill="#ffffff"/>
  <text x="660" y="46" text-anchor="middle" class="title">Planning and Execution Control Flow</text>
  <text x="660" y="74" text-anchor="middle" class="subtitle">Planning chooses an ordered path; execution validates and observes each step before continuing.</text>

  <rect x="48" y="112" width="1224" height="470" class="boundary"/>
  <text x="68" y="138" class="small">Control boundary: the controller owns plan review, step validation, budgets, progress, replanning, and stop reasons.</text>

  <g transform="translate(70 205)">
    <rect class="box" width="170" height="78" fill="#e8f0fe" stroke="#3367d6"/>
    <text x="85" y="32" text-anchor="middle" class="label">Goal, constraints,</text>
    <text x="85" y="53" text-anchor="middle" class="label">budget</text>
  </g>

  <g transform="translate(295 205)">
    <rect class="box" width="190" height="78" fill="#f3e8fd" stroke="#9334e6"/>
    <text x="95" y="32" text-anchor="middle" class="label">Planner proposes</text>
    <text x="95" y="53" text-anchor="middle" class="label">ordered steps</text>
  </g>

  <g transform="translate(545 184)">
    <path class="diamond" d="M105 0 L210 60 L105 120 L0 60 Z" fill="#fff4e5" stroke="#f9ab00"/>
    <text x="105" y="53" text-anchor="middle" class="label">Plan</text>
    <text x="105" y="72" text-anchor="middle" class="label">valid?</text>
  </g>

  <g transform="translate(545 410)">
    <rect class="box" width="190" height="78" fill="#fce8e6" stroke="#d93025"/>
    <text x="95" y="32" text-anchor="middle" class="label">Revise plan</text>
    <text x="95" y="53" text-anchor="middle" class="label">or ask</text>
  </g>

  <g transform="translate(810 205)">
    <rect class="box" width="190" height="78" fill="#eaf5ff" stroke="#007b83"/>
    <text x="95" y="32" text-anchor="middle" class="label">Executable</text>
    <text x="95" y="53" text-anchor="middle" class="label">step queue</text>
  </g>

  <g transform="translate(1060 184)">
    <path class="diamond" d="M105 0 L210 60 L105 120 L0 60 Z" fill="#fff4e5" stroke="#f9ab00"/>
    <text x="105" y="53" text-anchor="middle" class="label">Next step</text>
    <text x="105" y="72" text-anchor="middle" class="label">allowed?</text>
  </g>

  <g transform="translate(1060 410)">
    <rect class="box" width="190" height="78" fill="#fce8e6" stroke="#d93025"/>
    <text x="95" y="32" text-anchor="middle" class="label">Escalate, refuse,</text>
    <text x="95" y="53" text-anchor="middle" class="label">or replan</text>
  </g>

  <g transform="translate(810 410)">
    <rect class="box" width="190" height="78" fill="#e6f4ea" stroke="#188038"/>
    <text x="95" y="32" text-anchor="middle" class="label">Executor runs</text>
    <text x="95" y="53" text-anchor="middle" class="label">validated step</text>
  </g>

  <g transform="translate(545 610)">
    <rect class="box" width="190" height="78" fill="#eaf5ff" stroke="#007b83"/>
    <text x="95" y="32" text-anchor="middle" class="label">Observe result</text>
    <text x="95" y="53" text-anchor="middle" class="label">and errors</text>
  </g>

  <g transform="translate(295 610)">
    <rect class="box" width="190" height="78" fill="#e8f0fe" stroke="#3367d6"/>
    <text x="95" y="32" text-anchor="middle" class="label">Update progress,</text>
    <text x="95" y="53" text-anchor="middle" class="label">budget, trace</text>
  </g>

  <g transform="translate(70 588)">
    <path class="diamond" d="M105 0 L210 60 L105 120 L0 60 Z" fill="#fff4e5" stroke="#f9ab00"/>
    <text x="105" y="53" text-anchor="middle" class="label">Goal complete</text>
    <text x="105" y="72" text-anchor="middle" class="label">or stop hit?</text>
  </g>

  <g transform="translate(810 610)">
    <rect class="box" width="190" height="78" fill="#e6f4ea" stroke="#188038"/>
    <text x="95" y="32" text-anchor="middle" class="label">Final</text>
    <text x="95" y="53" text-anchor="middle" class="label">result</text>
  </g>

  <g transform="translate(1060 610)">
    <rect class="box" width="200" height="78" fill="#f1f3f4" stroke="#5f6368"/>
    <text x="100" y="32" text-anchor="middle" class="label">Trace plan, steps,</text>
    <text x="100" y="53" text-anchor="middle" class="label">observations, stop</text>
  </g>

  <path class="edge" d="M240 244 H295"/>
  <path class="edge" d="M485 244 H545"/>
  <path class="good" d="M755 244 H810"/>
  <path class="deny" d="M650 304 V410"/>
  <path class="loop" d="M545 449 C430 455 378 360 390 283"/>
  <path class="edge" d="M1000 244 H1060"/>
  <path class="good" d="M1165 304 C1165 370 1030 400 1000 430"/>
  <path class="deny" d="M1165 304 V410"/>
  <path class="edge" d="M810 449 H735"/>
  <path class="edge" d="M640 488 V610"/>
  <path class="edge" d="M545 649 H485"/>
  <path class="edge" d="M295 649 H280"/>
  <path class="good" d="M280 649 C430 725 690 715 810 668"/>
  <path class="loop" d="M175 588 C185 510 650 545 875 283"/>
  <path class="warn" d="M175 588 C230 510 330 420 390 283"/>
  <path class="edge" d="M1000 649 H1060"/>
  <path class="edge" d="M1155 488 V610"/>

  <text x="770" y="234" class="small">yes</text>
  <text x="660" y="352" class="small">no</text>
  <text x="1120" y="360" class="small">no</text>
  <text x="1040" y="405" class="small">yes</text>
  <text x="300" y="560" class="small">replan needed</text>
  <text x="330" y="710" class="small">yes</text>
  <text x="210" y="552" class="small">no</text>
</svg>
