<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
<title id="title">Evaluator-Optimizer Loop</title><desc id="desc">Architecture diagram for Evaluator-Optimizer Loop.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#5F6368"/></marker></defs>
<rect width="1120" height="520" fill="none"/>
<text x="560" y="45" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#173F4F">Evaluator-Optimizer Loop</text>
<line x1="250" y1="190" x2="310" y2="190" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="480" y1="190" x2="540" y2="190" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="750" y1="190" x2="810" y2="195" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="920" y1="240" x2="920" y2="330" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<text x="920" y="277" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">pass</text>
<line x1="810" y1="195" x2="750" y2="370" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<text x="780" y="274.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">revise</text>
