<text x="160" y="190" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#202124">Input + Criteria</text>
<rect x="310" y="150" width="170" height="80" rx="10" ry="10" fill="#E6F4EA" stroke="#188038" stroke-width="2"/>
