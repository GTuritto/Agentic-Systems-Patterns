<text x="920" y="185" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#202124">Evaluator</text>
<text x="920" y="207" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#202124">rubric, tests, policy</text>
<rect x="810" y="330" width="220" height="80" rx="10" ry="10" fill="#EAF5FF" stroke="#007B83" stroke-width="2"/>
