<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="420" viewBox="0 0 1080 420" role="img" aria-labelledby="title desc">
  <title id="title">Support refund agent capstone architecture</title>
  <desc id="desc">Support ticket enters runtime, policy gates read tools and draft creation, finance approval protects money movement, and trace plus eval records capture the run.</desc>
  <rect width="1080" height="420" fill="#f8fafc"/>
  <style>
    .box{fill:#ffffff;stroke:#1f2937;stroke-width:2;rx:8}
    .gate{fill:#fef3c7;stroke:#92400e;stroke-width:2;rx:8}
    .safe{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:8}
    .trace{fill:#e0f2fe;stroke:#075985;stroke-width:2;rx:8}
    .text{font:600 18px Arial, sans-serif;fill:#111827}
    .small{font:14px Arial, sans-serif;fill:#374151}
    .line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="box" x="40" y="150" width="140" height="70"/>
  <text class="text" x="70" y="180">Support</text>
  <text class="small" x="74" y="202">ticket</text>
  <rect class="box" x="230" y="150" width="150" height="70"/>
  <text class="text" x="272" y="180">Agent</text>
  <text class="small" x="268" y="202">runtime</text>
  <rect class="gate" x="430" y="70" width="160" height="70"/>
  <text class="text" x="458" y="100">Policy</text>
  <text class="small" x="474" y="122">gate</text>
  <rect class="box" x="650" y="70" width="160" height="70"/>
  <text class="text" x="686" y="100">Order +</text>
  <text class="small" x="684" y="122">policy tools</text>
  <rect class="safe" x="430" y="250" width="160" height="70"/>
  <text class="text" x="456" y="280">Draft for</text>
  <text class="small" x="474" y="302">review</text>
  <rect class="gate" x="650" y="250" width="160" height="70"/>
  <text class="text" x="680" y="280">Finance</text>
  <text class="small" x="674" y="302">approval</text>
  <rect class="trace" x="870" y="150" width="160" height="70"/>
  <text class="text" x="908" y="180">Trace +</text>
  <text class="small" x="908" y="202">eval gate</text>
  <path class="line" d="M180 185 H230"/>
  <path class="line" d="M380 185 C410 185 410 105 430 105"/>
  <path class="line" d="M590 105 H650"/>
  <path class="line" d="M730 140 C730 185 610 185 590 250"/>
  <path class="line" d="M380 185 C410 185 410 285 430 285"/>
  <path class="line" d="M590 285 H650"/>
  <path class="line" d="M810 285 C850 285 850 185 870 185"/>
  <path class="line" d="M590 285 C670 360 910 330 950 220"/>
</svg>
