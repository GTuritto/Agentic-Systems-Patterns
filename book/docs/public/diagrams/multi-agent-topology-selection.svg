<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
<title id="title">Multi-Agent Topology Selection</title><desc id="desc">Decision flow for choosing deterministic workflows, task delegation, supervisor-worker, parallel agents, debate, crews, or agents as services.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#5F6368"/></marker></defs>
<rect width="1120" height="600" fill="none"/>
<text x="560" y="45" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#173F4F">Multi-Agent Topology Selection</text>
<g font-family="Inter, Arial, sans-serif">
<rect x="455" y="85" width="210" height="65" rx="12" fill="#E8F0FE" stroke="#3367D6" stroke-width="2"/><text x="560" y="123" text-anchor="middle" font-size="16" font-weight="700" fill="#202124">Start With Workload</text>
<rect x="455" y="200" width="210" height="65" rx="12" fill="#E6F4EA" stroke="#188038" stroke-width="2"/><text x="560" y="238" text-anchor="middle" font-size="15" fill="#202124">Known sequence?</text>
<rect x="120" y="195" width="210" height="75" rx="12" fill="#EAF5FF" stroke="#007B83" stroke-width="2"/><text x="225" y="227" text-anchor="middle" font-size="16" font-weight="700" fill="#202124">Deterministic</text><text x="225" y="250" text-anchor="middle" font-size="13" fill="#3C4043">workflow with LLM steps</text>
<rect x="455" y="315" width="210" height="65" rx="12" fill="#FFF4E5" stroke="#F9AB00" stroke-width="2"/><text x="560" y="353" text-anchor="middle" font-size="15" fill="#202124">Separate boundaries?</text>
<rect x="790" y="300" width="220" height="95" rx="12" fill="#F3E8FD" stroke="#9334E6" stroke-width="2"/><text x="900" y="333" text-anchor="middle" font-size="16" font-weight="700" fill="#202124">Agents As Services</text><text x="900" y="358" text-anchor="middle" font-size="13" fill="#3C4043">team, runtime, trust</text><text x="900" y="378" text-anchor="middle" font-size="13" fill="#3C4043">or ownership boundary</text>
<rect x="150" y="430" width="180" height="75" rx="12" fill="#F1F3F4" stroke="#5F6368" stroke-width="2"/><text x="240" y="460" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">Task Delegation</text><text x="240" y="483" text-anchor="middle" font-size="13" fill="#3C4043">bounded subtasks</text>
<rect x="370" y="430" width="180" height="75" rx="12" fill="#F1F3F4" stroke="#5F6368" stroke-width="2"/><text x="460" y="460" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">Supervisor</text><text x="460" y="483" text-anchor="middle" font-size="13" fill="#3C4043">central acceptance</text>
<rect x="590" y="430" width="180" height="75" rx="12" fill="#F1F3F4" stroke="#5F6368" stroke-width="2"/><text x="680" y="460" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">Parallel Agents</text><text x="680" y="483" text-anchor="middle" font-size="13" fill="#3C4043">independent work</text>
<rect x="810" y="430" width="180" height="75" rx="12" fill="#F1F3F4" stroke="#5F6368" stroke-width="2"/><text x="900" y="460" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">Debate / Crews</text><text x="900" y="483" text-anchor="middle" font-size="13" fill="#3C4043">critique or flow step</text>
</g>
<line x1="560" y1="150" x2="560" y2="200" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="455" y1="232" x2="330" y2="232" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/><text x="390" y="220" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">yes</text>
<line x1="560" y1="265" x2="560" y2="315" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/><text x="575" y="292" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">no</text>
<line x1="665" y1="347" x2="790" y2="347" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/><text x="720" y="335" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">crosses boundary</text>
<line x1="520" y1="380" x2="240" y2="430" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="545" y1="380" x2="460" y2="430" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="575" y1="380" x2="680" y2="430" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<line x1="600" y1="380" x2="900" y2="430" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
</svg>
