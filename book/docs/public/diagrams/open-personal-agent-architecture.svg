<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="720" viewBox="0 0 1160 720" role="img" aria-labelledby="title desc">
  <title id="title">Open Personal Agent Architecture</title>
  <desc id="desc">A personal agent gateway connected to identity, memory, skills, tools, scheduler, and audit logs.</desc>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#5f6368"/></marker><style>text{font-family:Inter,Arial,sans-serif;fill:#202124}.title{font-size:30px;font-weight:700}.box-title{font-size:18px;font-weight:700}.box-sub{font-size:14px;fill:#3c4043}.edge{stroke:#5f6368;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.box{rx:12;ry:12;stroke-width:2.4}</style></defs>
  <rect width="1160" height="720" fill="#fff"/>
  <text x="580" y="52" text-anchor="middle" class="title">Open Personal Agent Architecture</text>
  <g transform="translate(60 110)"><rect class="box" width="190" height="82" fill="#e8f0fe" stroke="#3367d6"/><text x="95" y="31" text-anchor="middle" class="box-title">Channels</text><text x="95" y="57" text-anchor="middle" class="box-sub">chat, voice, web, CLI</text></g>
  <g transform="translate(320 110)"><rect class="box" width="230" height="82" fill="#e6f4ea" stroke="#188038"/><text x="115" y="31" text-anchor="middle" class="box-title">Gateway / Control Plane</text><text x="115" y="57" text-anchor="middle" class="box-sub">routing and task state</text></g>
  <g transform="translate(320 240)"><rect class="box" width="230" height="82" fill="#fce8e6" stroke="#d93025"/><text x="115" y="31" text-anchor="middle" class="box-title">Identity and Permissions</text><text x="115" y="57" text-anchor="middle" class="box-sub">user, scope, policy</text></g>
  <g transform="translate(620 110)"><rect class="box" width="230" height="82" fill="#fff4e5" stroke="#f9ab00"/><text x="115" y="31" text-anchor="middle" class="box-title">Personal Agent Loop</text><text x="115" y="57" text-anchor="middle" class="box-sub">plan, act, remember</text></g>
  <g transform="translate(620 240)"><rect class="box" width="230" height="82" fill="#eaf5ff" stroke="#007b83"/><text x="115" y="31" text-anchor="middle" class="box-title">Persistent Memory</text><text x="115" y="57" text-anchor="middle" class="box-sub">preferences, facts, history</text></g>
  <g transform="translate(620 370)"><rect class="box" width="230" height="82" fill="#f3e8fd" stroke="#9334e6"/><text x="115" y="31" text-anchor="middle" class="box-title">Skills and Procedures</text><text x="115" y="57" text-anchor="middle" class="box-sub">reviewed workflows</text></g>
  <g transform="translate(910 110)"><rect class="box" width="210" height="102" fill="#f1f3f4" stroke="#5f6368"/><text x="105" y="32" text-anchor="middle" class="box-title">Tools and Connectors</text><text x="105" y="58" text-anchor="middle" class="box-sub">email, calendar</text><text x="105" y="78" text-anchor="middle" class="box-sub">browser, files</text></g>
  <g transform="translate(910 260)"><rect class="box" width="210" height="82" fill="#e6f4ea" stroke="#188038"/><text x="105" y="31" text-anchor="middle" class="box-title">Scheduler</text><text x="105" y="57" text-anchor="middle" class="box-sub">delayed work</text></g>
  <g transform="translate(910 390)"><rect class="box" width="210" height="82" fill="#f1f3f4" stroke="#5f6368"/><text x="105" y="31" text-anchor="middle" class="box-title">Audit Log</text><text x="105" y="57" text-anchor="middle" class="box-sub">why, when, what changed</text></g>
  <path class="edge" d="M250 151 L320 151"/><path class="edge" d="M550 151 L620 151"/><path class="edge" d="M435 192 L435 240"/><path class="edge" d="M735 192 L735 240"/><path class="edge" d="M735 322 L735 370"/><path class="edge" d="M850 151 L910 151"/><path class="edge" d="M550 281 C680 281 780 160 910 160"/><path class="edge" d="M850 175 C890 210 910 250 940 260"/><path class="edge" d="M1015 212 L1015 390"/>
</svg>
