<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
<title id="title">A2A Agent Interoperability</title><desc id="desc">Architecture diagram for A2A Agent Interoperability.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#5F6368"/></marker></defs>
<rect width="1120" height="520" fill="none"/>
<text x="560" y="45" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#173F4F">A2A Agent Interoperability</text>
<line x1="250" y1="190" x2="320" y2="120" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<text x="285" y="147" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">discover</text>
<line x1="250" y1="190" x2="320" y2="285" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<text x="285" y="229.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">submit</text>
<line x1="510" y1="285" x2="590" y2="190" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<text x="550" y="229.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">validate</text>
<line x1="780" y1="190" x2="850" y2="195" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<text x="815" y="184.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">respond</text>
<line x1="250" y1="190" x2="590" y2="375" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<text x="420" y="274.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">optional</text>
<line x1="685" y1="340" x2="685" y2="230" stroke="#5F6368" stroke-width="2.4" marker-end="url(#arrow)"/>
<text x="685" y="277" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#3C4043">stop</text>
<rect x="70" y="150" width="180" height="80" rx="10" ry="10" fill="#E8F0FE" stroke="#3367D6" stroke-width="2"/>
<text x="160" y="190" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#202124">Client Agent</text>
<rect x="320" y="80" width="190" height="80" rx="10" ry="10" fill="#E6F4EA" stroke="#188038" stroke-width="2"/>
<text x="415" y="110" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#202124">Agent Card</text>
<text x="415" y="132" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#202124">capabilities</text>
<rect x="320" y="240" width="190" height="90" rx="10" ry="10" fill="#FFF4E5" stroke="#F9AB00" stroke-width="2"/>
<text x="415" y="275" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#202124">Task Request</text>
<text x="415" y="297" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#202124">id, type, input</text>
<rect x="590" y="150" width="190" height="80" rx="10" ry="10" fill="#F3E8FD" stroke="#9334E6" stroke-width="2"/>
<text x="685" y="190" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#202124">Remote Agent</text>
<rect x="850" y="150" width="220" height="90" rx="10" ry="10" fill="#EAF5FF" stroke="#007B83" stroke-width="2"/>
<text x="960" y="185" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#202124">Progress / Result</text>
<text x="960" y="207" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#202124">refusal / error</text>
<rect x="590" y="340" width="190" height="70" rx="10" ry="10" fill="#FCE8E6" stroke="#D93025" stroke-width="2"/>
<text x="685" y="375" text-anchor="middle" dominant-baseline="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#202124">Cancellation</text>
</svg>
