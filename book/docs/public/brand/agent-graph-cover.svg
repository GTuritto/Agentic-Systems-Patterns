<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" role="img" aria-labelledby="title desc">
  <title id="title">Agentic systems graph mark</title>
  <desc id="desc">A central agent node connected to goals, tools, memory, policy, runtime, and evaluation nodes.</desc>
  <defs>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f8a8a"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b7791f"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#173f4f" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="520" height="320" rx="28" fill="#f7fafb"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M260 158 C220 118 178 96 126 86" stroke="#1f8a8a" stroke-width="4" marker-end="url(#arrow-teal)"/>
    <path d="M260 158 C312 104 354 82 414 74" stroke="#1f8a8a" stroke-width="4" marker-end="url(#arrow-teal)"/>
    <path d="M260 158 C330 154 383 164 432 194" stroke="#b7791f" stroke-width="4" marker-end="url(#arrow-amber)"/>
    <path d="M260 158 C302 220 330 250 390 260" stroke="#1f8a8a" stroke-width="4" marker-end="url(#arrow-teal)"/>
    <path d="M260 158 C204 214 166 242 104 252" stroke="#1f8a8a" stroke-width="4" marker-end="url(#arrow-teal)"/>
    <path d="M260 158 C202 158 158 158 104 160" stroke="#b7791f" stroke-width="4" marker-end="url(#arrow-amber)"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="260" cy="158" r="54" fill="#173f4f"/>
    <circle cx="260" cy="158" r="38" fill="#245f73"/>
    <path d="M236 160 L254 178 L286 138" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" text-anchor="middle">
    <g>
      <circle cx="106" cy="82" r="35" fill="#ffffff" stroke="#1f8a8a" stroke-width="4"/>
      <text x="106" y="89" fill="#173f4f">Goal</text>
    </g>
    <g>
      <circle cx="418" cy="70" r="35" fill="#ffffff" stroke="#1f8a8a" stroke-width="4"/>
      <text x="418" y="77" fill="#173f4f">Tool</text>
    </g>
    <g>
      <circle cx="440" cy="202" r="35" fill="#ffffff" stroke="#b7791f" stroke-width="4"/>
      <text x="440" y="209" fill="#173f4f">Eval</text>
    </g>
    <g>
      <circle cx="392" cy="264" r="35" fill="#ffffff" stroke="#1f8a8a" stroke-width="4"/>
      <text x="392" y="271" fill="#173f4f">Run</text>
    </g>
    <g>
      <circle cx="98" cy="256" r="35" fill="#ffffff" stroke="#1f8a8a" stroke-width="4"/>
      <text x="98" y="263" fill="#173f4f">Mem</text>
    </g>
    <g>
      <circle cx="88" cy="160" r="35" fill="#ffffff" stroke="#b7791f" stroke-width="4"/>
      <text x="88" y="167" fill="#173f4f">Policy</text>
    </g>
  </g>
</svg>
