name: Publish Book

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            book/package-lock.json
            site/package-lock.json
      - run: npm ci
      - run: npm ci --prefix book
      - run: npm ci --prefix site
      - run: npx --prefix book playwright install --with-deps chromium
      - run: npm run release:commands
      - run: npm run capstones:evidence
      - run: npm run book:manifest:test
      - run: npm run book:visuals:verify
      - run: npm run book:quality
      - run: npm run book:pdf
      - run: npm run book:epub
      - run: npm run book:build
      - run: npm run site:build
      - run: npm run site:parity
      - uses: actions/upload-artifact@v4
        with:
          name: Agentic-Systems-Patterns-courtesy-formats
          path: |
            book/releases/Agentic-Systems-Patterns.pdf
            book/releases/Agentic-Systems-Patterns.epub
          retention-days: 30
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
